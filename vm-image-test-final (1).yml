name: 'VM Image Gallery Test'

on:
  push:
    branches: ['**']
    paths:
      - 'terraform/testing/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.11.4'
  TF_DIR:     './terraform/testing'
  BACKEND_RG: 'FSAM-DEV-BACKEND-RG'
  BACKEND_SA: 'fsamdevbeprivatebmw'
  BACKEND_CN: 'tfstate'

defaults:
  run:
    shell: bash

# =============================================================================
# Reusable steps are defined as a job-level composite via the 'call' pattern.
# Each job runs the same sequence:
# Jobs run sequentially: dev first, then dev1, then uat.
# =============================================================================

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  dev:
  # ───────────────────────────────────────────────────────────────────────────
    name: 'DEV — create & destroy'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git credentials
        run: |
          git config --global url."https://${{ github.token }}@atc-github.azure.cloud.bmw/".insteadOf \
            "https://atc-github.azure.cloud.bmw/"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ env.BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_SA }}" \
            -backend-config="container_name=${{ env.BACKEND_CN }}" \
            -backend-config="key=imgtest-dev.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false \
            -var-file="tfvars/dev.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var-file="tfvars/dev.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -input=false -auto-approve \
            -var-file="tfvars/dev.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Azure Logout
        if: always()
        run: az logout


  # ───────────────────────────────────────────────────────────────────────────
  dev1:
  # ───────────────────────────────────────────────────────────────────────────
    name: 'DEV1 — create & destroy'
    runs-on: ubuntu-latest
    needs: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git credentials
        run: |
          git config --global url."https://${{ github.token }}@atc-github.azure.cloud.bmw/".insteadOf \
            "https://atc-github.azure.cloud.bmw/"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV1 }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ env.BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_SA }}" \
            -backend-config="container_name=${{ env.BACKEND_CN }}" \
            -backend-config="key=imgtest-dev1.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false \
            -var-file="tfvars/dev1.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var-file="tfvars/dev1.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -input=false -auto-approve \
            -var-file="tfvars/dev1.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Azure Logout
        if: always()
        run: az logout


  # ───────────────────────────────────────────────────────────────────────────
  uat:
  # ───────────────────────────────────────────────────────────────────────────
    name: 'UAT — create & destroy'
    runs-on: ubuntu-latest
    needs: dev1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git credentials
        run: |
          git config --global url."https://${{ github.token }}@atc-github.azure.cloud.bmw/".insteadOf \
            "https://atc-github.azure.cloud.bmw/"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_UAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ env.BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_SA }}" \
            -backend-config="container_name=${{ env.BACKEND_CN }}" \
            -backend-config="key=imgtest-uat.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false \
            -var-file="tfvars/uat.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var-file="tfvars/uat.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Terraform Destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -input=false -auto-approve \
            -var-file="tfvars/uat.tfvars" \
            -var="vm_admin_password=${{ secrets.VM_TEST_ADMIN_PASSWORD }}"

      - name: Azure Logout
        if: always()
        run: az logout
