# Step 1: Install TFLint (this action handles it all)
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
          github_token: ${{ secrets.GH_TOKEN }}

      # Step 2: Init plugin (needs the config file)
      - name: Init TFLint
        run: |
          cat > .tflint.hcl << 'EOF'
          plugin "azurerm" {
            enabled = true
            version = "0.27.0"
            source  = "github.com/terraform-linters/tflint-ruleset-azurerm"
          }
          EOF
          tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Step 3: Run it
      - name: TFLint
        working-directory: ${{ env.TF_DIR }}
        run: tflint --format compact
